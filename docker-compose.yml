services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: art-of-tea:latest
    container_name: art-of-tea-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-art_of_tea}
      DB_USER: ${DB_USER:-art}
      DB_PASS: ${DB_PASS:-art_password_change_me}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - art-net

  db:
    image: mariadb:11
    container_name: art-of-tea-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-art_of_tea}
      MARIADB_USER: ${DB_USER:-art}
      MARIADB_PASSWORD: ${DB_PASS:-art_password_change_me}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_password_change_me}
      MARIADB_AUTO_UPGRADE: "1"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_ft_min_token_size=3
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - art-net

volumes:
  db_data:
    name: art-of-tea-db-data

networks:
  art-net:
    name: art-of-tea-net
